<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>audio.cpp Realtime Voice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="booting">
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="ident">
            <div class="ident-head">
              <span class="ident-title">audio.cpp Realtime</span>
            </div>
            <p class="ident-blurb">Real-time voice chat powered by audio.cpp TTS + LLM.</p>
          </div>
        </div>
        <div class="topbar-right">
          <button id="chat-btn" class="icon-btn" title="Conversation history" aria-label="Conversation history">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span id="chat-badge" class="chat-badge" aria-hidden="true"></span>
          </button>
          <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c0 .66.39 1.25 1 1.51H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <main class="stage">
        <div class="orb-wrap">
          <div id="mic-gate" class="mic-gate">
            <svg id="mic-gate-arc" class="mic-gate-arc" viewBox="0 0 100 100" aria-hidden="true">
              <path id="mga-track" class="mga-track" fill="none" />
              <path id="mga-fill" class="mga-fill" fill="none" />
              <path id="mga-hit" class="mga-hit" fill="none" />
              <circle id="mga-handle" class="mga-handle" r="3" />
            </svg>
            <button id="mic-btn" class="side-btn" type="button" aria-label="Mute" title="Mute" aria-hidden="true">
              <svg class="mic-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
              <svg class="mic-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M9 5a3 3 0 0 1 6 0v4"/><path d="M9 10v1a3 3 0 0 0 5.1 2.1"/><path d="M19 10a7 7 0 0 1-1.24 3.97"/><path d="M5 10a7 7 0 0 0 11 5.67"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            </button>
          </div>

          <button id="main-circle" class="circle state-idle" type="button" aria-label="Start voice conversation">
            <span class="circle-glow" aria-hidden="true"></span>
            <span class="circle-ring" aria-hidden="true"></span>
            <span class="circle-ring-outer" aria-hidden="true"></span>
            <span class="circle-core">
              <span class="circle-indicator" aria-hidden="true">
                <svg class="ind ind-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" stroke="none"/>
                  <path d="M5 10a7 7 0 0 0 14 0"/>
                  <line x1="12" y1="19" x2="12" y2="22"/>
                  <line x1="8" y1="22" x2="16" y2="22"/>
                </svg>
                <svg class="ind ind-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="16" x2="12" y2="16"/></svg>
                <span class="ind ind-spinner"></span>
                <span class="ind ind-thinking">
                  <span class="dot"></span>
                  <span class="dot"></span>
                  <span class="dot"></span>
                </span>
                <span class="ind ind-bars">
                  <span class="bar"></span>
                  <span class="bar"></span>
                  <span class="bar"></span>
                  <span class="bar"></span>
                  <span class="bar"></span>
                </span>
                <svg class="ind ind-voice" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 10v4a1 1 0 0 0 1 1h3l5 4V5L7 9H4a1 1 0 0 0-1 1z" fill="currentColor" stroke="none"/>
                  <path class="wave wave-1" d="M16 8a5 5 0 0 1 0 8"/>
                  <path class="wave wave-2" d="M19 5a9 9 0 0 1 0 14"/>
                </svg>
              </span>
            </span>
          </button>

          <button id="stop-btn" class="side-btn" type="button" aria-label="End" title="End" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>

        <p id="circle-caption" class="circle-caption" role="status">Tap to start</p>

        <div id="bubble-stack" class="bubble-stack" aria-live="polite"></div>

        <!-- Chat panel (slide-in from right) -->
        <div id="chat-panel" class="chat-panel">
          <div id="chat-panel-backdrop" class="chat-panel-backdrop"></div>
          <div class="chat-panel-inner">
            <header class="chat-panel-header">
              <h3>Conversation</h3>
              <button id="chat-panel-close" class="icon-btn" aria-label="Close">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </header>
            <div id="chat-history" class="chat-history"></div>
          </div>
        </div>

        <!-- Queue UI -->
        <div id="queue-bar" class="queue-bar" hidden>
          <span id="queue-position" class="queue-position"></span>
          <button id="queue-leave" class="btn plain" hidden>Leave queue</button>
        </div>
        <div id="queue-funnel" class="queue-funnel" hidden>
          <div class="queue-funnel-card">
            <p id="queue-funnel-msg"></p>
            <div class="queue-funnel-actions">
              <button id="queue-funnel-join" class="btn primary">Join now</button>
              <button id="queue-funnel-leave" class="btn plain">Leave queue</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <dialog id="settings-modal" class="modal">
      <form method="dialog" class="modal-content">
        <header class="modal-header">
          <h2>Settings</h2>
          <button class="icon-btn" value="close" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </header>

        <div class="tab-panels">
          <section class="tab-panel active" role="tabpanel">
            <div class="settings-grid">
              <div class="settings-column">
                <p class="settings-group-title">TTS · audio.cpp 语音合成服务</p>
            <div class="field-row">
              <label class="field">
                <span>TTS server URL</span>
                <input id="tts-url" type="text" autocomplete="off" spellcheck="false" placeholder="http://127.0.0.1:8080" />
              </label>
              <label class="field">
                <span>TTS model</span>
                <input id="tts-model" type="text" autocomplete="off" spellcheck="false" placeholder="qwen3-tts" />
              </label>
            </div>
            <div class="field-row">
              <label class="field">
                <span>Voice ref 音频路径 <small>(克隆音色, 可选)</small></span>
                <input id="tts-voice-ref" type="text" autocomplete="off" spellcheck="false" placeholder="voice/demo_01_man.wav" />
              </label>
              <label class="field">
                <span>Voice name <small>(命名音色, 可选)</small></span>
                <input id="tts-voice" type="text" autocomplete="off" spellcheck="false" placeholder="(留空则用 voice ref)" />
              </label>
            </div>
            <label class="field">
              <span>Reference text <small>(voice ref 的原话, 可选)</small></span>
              <input id="tts-ref-text" type="text" autocomplete="off" spellcheck="false" placeholder="参考音频里说的那句话" />
            </label>

            <p class="settings-group-title">ASR · audio.cpp 语音识别服务</p>
            <div class="field-row">
              <label class="field">
                <span>ASR server URL</span>
                <input id="asr-url" type="text" autocomplete="off" spellcheck="false" placeholder="http://127.0.0.1:8081" />
              </label>
              <label class="field">
                <span>ASR model</span>
                <input id="asr-model" type="text" autocomplete="off" spellcheck="false" placeholder="qwen3-asr" />
              </label>
            </div>
            <label class="field">
              <span>ASR language <small>(可选, 如 zh / en)</small></span>
              <input id="asr-language" type="text" autocomplete="off" spellcheck="false" placeholder="(自动)" />
            </label>

              </div>
              <div class="settings-column">
                <p class="settings-group-title">LLM · Chat Completions</p>
            <div class="field-row">
              <label class="field">
                <span>LLM base URL</span>
                <input id="llm-url" type="text" autocomplete="off" spellcheck="false" placeholder="https://api.deepseek.com/v1" />
              </label>
              <label class="field">
                <span>LLM model</span>
                <input id="llm-model" type="text" autocomplete="off" spellcheck="false" placeholder="deepseek-chat" />
              </label>
            </div>
            <label class="field">
              <span>LLM API key</span>
              <input id="llm-key" type="password" autocomplete="off" spellcheck="false" placeholder="sk-..." />
            </label>

            <label class="field">
              <span>Instructions <small>(系统提示)</small></span>
              <textarea id="instructions" rows="4" placeholder="You are a friendly voice assistant..."></textarea>
            </label>

            <label class="field">
              <span>Noise gate <small>(噪声门; 最左=关闭)</small> <span id="gate-value" class="field-value">Off</span></span>
              <div class="gate">
                <div class="gate-track" aria-hidden="true">
                  <div id="gate-meter-fill" class="gate-meter-fill"></div>
                  <input id="noise-gate" type="range" min="-66" max="-3" step="1" value="-50" aria-label="Noise gate threshold" />
                </div>
                <div class="gate-ends">
                  <span>Off</span>
                  <span>−3 dB</span>
                </div>
              </div>
              <small>低于此阈值的音频不发送到 VAD。弧形条可拖拽调节。</small>
            </label>

            <label class="field">
              <span>Realtime server URL <small>(WebSocket 后端)</small></span>
              <input id="rt-url" type="text" autocomplete="off" spellcheck="false" placeholder="ws://127.0.0.1:8765/v1/realtime" />
              <small>改这个需要重新连接才生效。上面的 TTS/ASR/LLM 参数可在通话中实时保存。</small>
            </label>
              </div>
            </div>
          </section>
        </div>

        <footer class="modal-footer">
          <button id="settings-save" type="submit" class="btn primary" value="save">Save</button>
        </footer>
      </form>
    </dialog>

    <script type="module" src="main.js"></script>
  </body>
</html>
